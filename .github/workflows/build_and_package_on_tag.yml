name: Build and Package on Windows
run-name: ${{ github.actor }} building and packaging Automation Tool
on:
  push:
    tags:
      - '*v*'

jobs:
  build:
    name: Create release
    runs-on: windows-latest
    permissions: write-all
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Fetch and Get Tag Version
        id: tag_name
        run: |
          git fetch --all --tags --prune
          $latestTag = git tag --list --sort=-creatordate | Select-Object -First 1
          if (-not $latestTag) {
            Write-Error "No tags found!"
            exit 1
          }
          echo "tag_version=$latestTag" >> $env:GITHUB_OUTPUT
          Write-Host "Found latest tag: $latestTag"
        shell: pwsh

      - name: Get latest commit message
        id: commit_message
        run: |
          $msg = git log -1 --pretty=%B
          $msg = $msg.Trim() -replace "`r`n", " " -replace "`n", " "
          echo "commit_message=$msg" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Update Version Files and Push
        id: update_files
        run: |
          $TAG = "${{ steps.tag_name.outputs.tag_version }}"
          $BRANCH_NAME = "update-release-$TAG"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Tạo nhánh mới từ main để update version
          git checkout main
          git pull origin main
          git checkout -b $BRANCH_NAME
          
          # Cập nhật file version
          if (!(Test-Path "release_notes")) { New-Item -ItemType Directory -Path "release_notes" }
          $TAG | Out-File -FilePath "release_notes/current_release_version.txt" -Encoding utf8
          
          # Regex cập nhật version trong file Inno Setup
          (Get-Content automation_tool.iss) -replace '#define MyAppVersion ".*"', "#define MyAppVersion `"$TAG`"" | Set-Content automation_tool.iss
          
          git add .
          git commit -m "chore: update version to $TAG"
          git push origin $BRANCH_NAME --force
        shell: pwsh

      - name: Create Pull Request
        id: create_pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Update version files for ${{ steps.tag_name.outputs.tag_version }}"
          title: "Automated update for release ${{ steps.tag_name.outputs.tag_version }}"
          body: "Automated PR to update version files. Please review and merge."
          base: main
          branch: "update-release-${{ steps.tag_name.outputs.tag_version }}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller comtypes
        shell: pwsh

      - name: Build executable
        run: |
          pyinstaller automation_tool.spec
        shell: pwsh

      - name: Copy additional folders to dist
        run: |
          $folders = @("input", "release_notes", "src/task/web", "src/task/desktop", "src/task/arbitrary")
          foreach ($folder in $folders) {
            if (Test-Path $folder) {
              $dest = "dist\$folder"
              if (!(Test-Path $dest)) { New-Item -ItemType Directory -Path $dest -Force }
              xcopy $folder $dest /E /H /C /I /Y
            }
          }
        shell: pwsh

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" /DMyAppVersion="${{ steps.tag_name.outputs.tag_version }}" "automation_tool.iss"
        shell: pwsh

      - name: Read Release Notes for Body
        id: read_notes
        run: |
          $path = "release_notes/current_release_version.txt"
          if (Test-Path $path) {
            $content = Get-Content $path -Raw
            # Loại bỏ các ký tự đặc biệt có thể làm hỏng output
            $content = $content.Trim()
            echo "content=$content" >> $env:GITHUB_OUTPUT
          } else {
            echo "content=New release $TAG" >> $env:GITHUB_OUTPUT
          }
        shell: pwsh

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_name.outputs.tag_version }}
          name: Release ${{ steps.tag_name.outputs.tag_version }}
          body: ${{ steps.read_notes.outputs.content }}
          files: |
            dist/automation_tool.exe
            dist/automation_tool_installer.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete update branch
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const branchName = `update-release-${{ steps.tag_name.outputs.tag_version }}`;
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branchName}`
              });
            } catch (e) {
              console.log("Branch already deleted or not found");
            }